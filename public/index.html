<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── Reset & tokens ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal:        #0d9488;
      --teal-dark:   #0f766e;
      --teal-light:  rgba(13,148,136,.1);
      --red:         #ef4444;
      --red-light:   #fef2f2;
      --orange:      #f97316;
      --orange-light:#fff7ed;
      --amber:       #d97706;
      --amber-light: #fffbeb;
      --green:       #16a34a;
      --green-light: #f0fdf4;
      --gray-50:     #f8fafc;
      --gray-100:    #f1f5f9;
      --gray-200:    #e2e8f0;
      --gray-400:    #94a3b8;
      --gray-500:    #64748b;
      --gray-900:    #0f172a;
      --radius:      10px;
      --shadow-sm:   0 1px 2px rgba(0,0,0,.06);
      --shadow:      0 2px 8px rgba(0,0,0,.09);
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--gray-50);
      color: var(--gray-900);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Utility ────────────────────────────────────────────────────────── */
    .hidden { display: none !important; }

    /* ── Auth page ──────────────────────────────────────────────────────── */
    #auth-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .auth-card {
      width: 100%;
      max-width: 380px;
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      box-shadow: var(--shadow);
    }

    .auth-logo {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--teal);
      margin-bottom: 0.25rem;
    }

    .auth-subtitle {
      font-size: 0.85rem;
      color: var(--gray-400);
      margin-bottom: 1.75rem;
    }

    .auth-tabs {
      display: flex;
      gap: 1.25rem;
      border-bottom: 1px solid var(--gray-200);
      margin-bottom: 1.5rem;
    }

    .auth-tab {
      padding: 0.35rem 0;
      border: none;
      border-bottom: 2px solid transparent;
      background: none;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      font-family: inherit;
      color: var(--gray-400);
      margin-bottom: -1px;
      transition: color .15s, border-color .15s;
    }

    .auth-tab.active { color: var(--teal); border-bottom-color: var(--teal); }

    .auth-field { margin-bottom: 0.875rem; }

    .auth-field label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--gray-500);
      margin-bottom: 0.35rem;
    }

    .auth-field input {
      width: 100%;
      padding: 0.6rem 0.875rem;
      border: 1px solid var(--gray-200);
      border-radius: 8px;
      font-size: 0.9rem;
      font-family: inherit;
      color: var(--gray-900);
      background: #fff;
      transition: border-color .15s, box-shadow .15s;
      outline: none;
    }

    .auth-field input:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px var(--teal-light);
    }

    .auth-error {
      color: var(--red);
      font-size: 0.8rem;
      min-height: 1.1rem;
      margin-bottom: 0.75rem;
    }

    .btn-primary {
      display: block;
      width: 100%;
      padding: 0.65rem;
      background: var(--teal);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background .15s;
    }

    .btn-primary:hover { background: var(--teal-dark); }

    /* ── App shell ──────────────────────────────────────────────────────── */
    #app-page { display: none; }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #fff;
      border-bottom: 1px solid var(--gray-200);
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      height: 52px;
    }

    .app-logo { font-size: 1rem; font-weight: 600; color: var(--teal); flex-shrink: 0; }

    .stats-strip {
      display: flex;
      gap: 1rem;
      font-size: 0.78rem;
      color: var(--gray-400);
    }

    .stats-strip b { font-weight: 600; color: var(--gray-900); }
    .stats-strip .overdue-stat b { color: var(--red); }

    .header-actions { margin-left: auto; display: flex; align-items: center; gap: 0.75rem; }

    .btn-ghost {
      background: none;
      border: 1px solid var(--gray-200);
      border-radius: 7px;
      padding: 0.3rem 0.75rem;
      font-size: 0.8rem;
      font-family: inherit;
      color: var(--gray-500);
      cursor: pointer;
      text-decoration: none;
      transition: border-color .15s, color .15s;
    }

    .btn-ghost:hover { border-color: var(--gray-400); color: var(--gray-900); }

    .main { max-width: 720px; margin: 0 auto; padding: 1.5rem 1.25rem 4rem; }

    /* ── Add task form ──────────────────────────────────────────────────── */
    .add-form {
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 0.875rem 1rem;
      margin-bottom: 1.25rem;
      box-shadow: var(--shadow-sm);
    }

    .add-form-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    #new-title {
      flex: 1;
      border: none;
      outline: none;
      font-size: 0.95rem;
      font-family: inherit;
      color: var(--gray-900);
      background: none;
      min-width: 0;
    }

    #new-title::placeholder { color: var(--gray-400); }

    .add-form-extras {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 0.625rem;
      padding-top: 0.625rem;
      border-top: 1px solid var(--gray-100);
    }

    .add-form-extras input,
    .add-form-extras select {
      border: none;
      background: none;
      outline: none;
      font-size: 0.82rem;
      font-family: inherit;
      color: var(--gray-500);
      cursor: pointer;
      padding: 0;
    }

    .add-form-extras input::placeholder { color: var(--gray-400); }

    .add-form-extras input[type="date"] { min-width: 120px; }

    .add-submit {
      width: 2rem;
      height: 2rem;
      border-radius: 8px;
      background: var(--teal);
      border: none;
      color: #fff;
      font-size: 1.3rem;
      line-height: 1;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s;
    }

    .add-submit:hover { background: var(--teal-dark); }

    .form-error { color: var(--red); font-size: 0.8rem; margin-bottom: 0.75rem; min-height: 1rem; }

    /* ── Filters & search ───────────────────────────────────────────────── */
    .toolbar {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    #search-input {
      flex: 1;
      min-width: 160px;
      padding: 0.45rem 0.75rem;
      border: 1px solid var(--gray-200);
      border-radius: 7px;
      font-size: 0.85rem;
      font-family: inherit;
      outline: none;
      background: #fff;
      color: var(--gray-900);
      transition: border-color .15s, box-shadow .15s;
    }

    #search-input:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px var(--teal-light);
    }

    .toolbar select {
      padding: 0.4rem 0.6rem;
      border: 1px solid var(--gray-200);
      border-radius: 7px;
      font-size: 0.82rem;
      font-family: inherit;
      background: #fff;
      color: var(--gray-500);
      cursor: pointer;
      outline: none;
    }

    .btn-sort {
      padding: 0.4rem 0.75rem;
      border: 1px solid var(--gray-200);
      border-radius: 7px;
      font-size: 0.82rem;
      font-family: inherit;
      background: #fff;
      color: var(--gray-500);
      cursor: pointer;
      white-space: nowrap;
      transition: border-color .15s, color .15s;
    }

    .btn-sort.active { border-color: var(--teal); color: var(--teal); }

    /* ── Task cards ─────────────────────────────────────────────────────── */
    #task-list { display: grid; gap: 0.5rem; }

    .card {
      background: #fff;
      border: 1px solid var(--gray-200);
      border-left: 3px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 0.75rem 0.875rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      box-shadow: var(--shadow-sm);
      cursor: pointer;
      transition: box-shadow .15s;
    }

    .card:hover { box-shadow: var(--shadow); }
    .card:hover .card-delete { opacity: 1; }

    .card.priority-high   { border-left-color: var(--red); }
    .card.priority-medium { border-left-color: var(--amber); }
    .card.priority-low    { border-left-color: var(--green); }

    .card.card--done { opacity: .5; }
    .card.card--overdue { background: var(--red-light); }

    /* Circular checkbox */
    .check-btn {
      width: 1.1rem;
      height: 1.1rem;
      border-radius: 50%;
      border: 2px solid var(--gray-200);
      background: #fff;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6rem;
      color: #fff;
      transition: background .15s, border-color .15s;
    }

    .check-btn.checked { background: var(--teal); border-color: var(--teal); }

    .card-body { flex: 1; min-width: 0; }

    .card-title {
      font-size: 0.9rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card--done .card-title { text-decoration: line-through; color: var(--gray-400); }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-top: 0.2rem;
    }

    .meta-due { font-size: 0.75rem; color: var(--gray-400); }
    .meta-due.overdue  { color: var(--red);    font-weight: 500; }
    .meta-due.today    { color: var(--orange);  font-weight: 500; }
    .meta-due.soon     { color: var(--amber);   font-weight: 500; }

    .badge {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .03em;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
    }

    .badge-high   { background: var(--red-light);    color: var(--red); }
    .badge-medium { background: var(--amber-light);  color: var(--amber); }
    .badge-low    { background: var(--green-light);  color: var(--green); }

    .label-chip {
      font-size: 0.68rem;
      font-weight: 600;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
    }

    .sub-progress { font-size: 0.75rem; color: var(--gray-400); }
    .recur-badge  { font-size: 0.75rem; color: var(--gray-400); }

    .card-delete {
      background: none;
      border: none;
      color: var(--gray-400);
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0.25rem;
      flex-shrink: 0;
      opacity: 0;
      transition: color .15s, opacity .15s;
      line-height: 1;
    }

    .card-delete:hover { color: var(--red); }

    .empty-state {
      text-align: center;
      color: var(--gray-400);
      padding: 3rem 0;
      font-size: 0.875rem;
    }

    /* ── Drag ───────────────────────────────────────────────────────────── */
    .card.drag-over { border-top: 2px solid var(--teal); }

    /* ── Bulk select ────────────────────────────────────────────────────── */
    .card--selected { background: var(--teal-light); border-left-color: var(--teal) !important; }

    .select-checkbox {
      width: 1.1rem;
      height: 1.1rem;
      border: 2px solid var(--gray-200);
      border-radius: 4px;
      background: #fff;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      color: #fff;
      transition: background .15s, border-color .15s;
    }

    .select-checkbox.checked { background: var(--teal); border-color: var(--teal); }

    .action-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--gray-900);
      color: #fff;
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      z-index: 40;
      box-shadow: 0 -4px 16px rgba(0,0,0,.2);
    }

    .action-count {
      font-size: 0.85rem;
      font-weight: 600;
      margin-right: auto;
    }

    .btn-action {
      padding: 0.4rem 0.875rem;
      border-radius: 7px;
      border: none;
      font-size: 0.82rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: opacity .15s;
    }

    .btn-action:hover { opacity: .85; }
    .btn-action--ghost  { background: rgba(255,255,255,.12); color: #fff; }
    .btn-action--teal   { background: var(--teal);  color: #fff; }
    .btn-action--red    { background: var(--red);   color: #fff; }
    .btn-action--cancel { background: transparent; color: rgba(255,255,255,.6); border: 1px solid rgba(255,255,255,.2); }

    /* ── Detail panel ───────────────────────────────────────────────────── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.35);
      z-index: 20;
    }

    .overlay.visible { display: block; }

    .detail-panel {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: 400px;
      max-width: 100vw;
      background: #fff;
      border-left: 1px solid var(--gray-200);
      box-shadow: -4px 0 20px rgba(0,0,0,.1);
      z-index: 30;
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform .25s ease;
    }

    .detail-panel.open { transform: translateX(0); }

    .detail-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--gray-200);
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 1;
    }

    .detail-header h2 { font-size: 0.95rem; font-weight: 600; }

    .close-btn {
      background: none;
      border: none;
      font-size: 1.1rem;
      color: var(--gray-400);
      cursor: pointer;
      padding: 0.25rem;
      line-height: 1;
    }

    .close-btn:hover { color: var(--gray-900); }

    .detail-body { padding: 1.25rem; }

    .field-group { margin-bottom: 1rem; }

    .field-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--gray-500);
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-bottom: 0.35rem;
    }

    .field-group input,
    .field-group select,
    .field-group textarea {
      width: 100%;
      padding: 0.55rem 0.75rem;
      border: 1px solid var(--gray-200);
      border-radius: 7px;
      font-size: 0.875rem;
      font-family: inherit;
      color: var(--gray-900);
      background: #fff;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }

    .field-group input:focus,
    .field-group select:focus,
    .field-group textarea:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px var(--teal-light);
    }

    .field-group textarea { resize: vertical; min-height: 64px; }

    .detail-save {
      width: 100%;
      padding: 0.6rem;
      background: var(--teal);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      margin-bottom: 1.5rem;
      transition: background .15s;
    }

    .detail-save:hover { background: var(--teal-dark); }

    .detail-section { border-top: 1px solid var(--gray-100); padding-top: 1.25rem; margin-bottom: 1.25rem; }

    .detail-section h3 { font-size: 0.8rem; font-weight: 600; color: var(--gray-500); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 0.75rem; }

    /* Subtask list */
    .subtask-list, .notes-list { list-style: none; display: grid; gap: 0.35rem; margin-bottom: 0.75rem; }

    .subtask-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.5rem;
      border-radius: 6px;
      background: var(--gray-50);
    }

    .subtask-item input[type="checkbox"] {
      width: 1rem;
      height: 1rem;
      accent-color: var(--teal);
      flex-shrink: 0;
      cursor: pointer;
    }

    .subtask-item span { flex: 1; font-size: 0.875rem; }
    .subtask-item.done span { text-decoration: line-through; color: var(--gray-400); }

    .note-item {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      padding: 0.4rem 0.5rem;
      border-radius: 6px;
      background: var(--gray-50);
    }

    .note-item span { flex: 1; font-size: 0.875rem; line-height: 1.4; }

    .icon-del {
      background: none;
      border: none;
      color: var(--gray-400);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 0.1rem;
      line-height: 1;
      flex-shrink: 0;
      transition: color .15s;
    }

    .icon-del:hover { color: var(--red); }

    .inline-add {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .inline-add input {
      flex: 1;
      padding: 0.45rem 0.625rem;
      border: 1px solid var(--gray-200);
      border-radius: 7px;
      font-size: 0.85rem;
      font-family: inherit;
      outline: none;
      transition: border-color .15s;
    }

    .inline-add input:focus { border-color: var(--teal); }

    .btn-add {
      padding: 0.4rem 0.75rem;
      background: var(--gray-100);
      border: none;
      border-radius: 7px;
      font-size: 0.8rem;
      font-family: inherit;
      font-weight: 500;
      color: var(--gray-500);
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s;
    }

    .btn-add:hover { background: var(--gray-200); }

    @media (max-width: 480px) {
      .detail-panel { width: 100vw; }
      .stats-strip { display: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition-duration: .01ms !important; }
    }
  </style>
</head>
<body>

<!-- ── Auth page ──────────────────────────────────────────────────────────── -->
<div id="auth-page">
  <div class="auth-card">
    <div class="auth-logo">✓ Tasks</div>
    <p class="auth-subtitle">Sign in to manage your tasks</p>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login">Login</button>
      <button class="auth-tab" id="tab-register">Register</button>
    </div>
    <div class="auth-error" id="auth-error"></div>
    <form id="login-form">
      <div class="auth-field">
        <label>Email</label>
        <input type="email" id="login-email" autocomplete="email" required>
      </div>
      <div class="auth-field">
        <label>Password</label>
        <input type="password" id="login-password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-primary">Login</button>
    </form>
    <form id="register-form" class="hidden">
      <div class="auth-field">
        <label>Email</label>
        <input type="email" id="reg-email" autocomplete="email" required>
      </div>
      <div class="auth-field">
        <label>Password <small style="font-weight:400">(min 8 characters)</small></label>
        <input type="password" id="reg-password" autocomplete="new-password" minlength="8" required>
      </div>
      <button type="submit" class="btn-primary">Create account</button>
    </form>
  </div>
</div>

<!-- ── App page ───────────────────────────────────────────────────────────── -->
<div id="app-page">
  <header class="app-header">
    <span class="app-logo">✓ Tasks</span>
    <div class="stats-strip" id="stats-strip"></div>
    <div class="header-actions">
      <a href="/api/tasks/export?format=csv" class="btn-ghost" id="export-link">Export CSV</a>
      <button class="btn-ghost" id="logout-btn">Logout</button>
    </div>
  </header>

  <main class="main">
    <!-- Add task -->
    <form class="add-form" id="add-form">
      <div class="add-form-row">
        <input type="text" id="new-title" placeholder="Add a task…" required>
        <button type="submit" class="add-submit" title="Add task">+</button>
      </div>
      <div class="add-form-extras">
        <input type="date" id="new-due">
        <select id="new-priority">
          <option value="medium" selected>Medium priority</option>
          <option value="high">High priority</option>
          <option value="low">Low priority</option>
        </select>
        <input type="text" id="new-labels" placeholder="Labels (comma-separated)" style="flex:1;min-width:140px">
      </div>
    </form>
    <p class="form-error" id="form-error"></p>

    <!-- Toolbar -->
    <div class="toolbar">
      <input type="text" id="search-input" placeholder="Search tasks…">
      <select id="filter-completed">
        <option value="">All tasks</option>
        <option value="false">Incomplete</option>
        <option value="true">Completed</option>
      </select>
      <select id="filter-priority">
        <option value="">All priorities</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
      </select>
      <button class="btn-sort" id="sort-btn">Sort by due date</button>
      <button class="btn-sort" id="select-btn">Select</button>
    </div>

    <!-- Task list -->
    <div id="task-list"></div>
  </main>

  <!-- Bulk action bar -->
  <div class="action-bar hidden" id="action-bar">
    <span class="action-count" id="action-count">0 selected</span>
    <button class="btn-action btn-action--ghost" id="select-all-btn">Select all</button>
    <button class="btn-action btn-action--teal" id="bulk-complete-btn">Mark complete</button>
    <button class="btn-action btn-action--red" id="bulk-delete-btn">Delete</button>
    <button class="btn-action btn-action--cancel" id="cancel-select-btn">Cancel</button>
  </div>

  <!-- Detail panel -->
  <div class="overlay" id="overlay"></div>
  <aside class="detail-panel" id="detail-panel"></aside>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let tasks = [];
let activeId = null;
let sortState = 0; // 0=off 1=asc 2=desc
let searchTimer = null;
let selectMode = false;
let selectedIds = new Set();

const LABEL_PALETTE = [
  ['#f0fdf4','#15803d'], ['#eff6ff','#1d4ed8'], ['#fdf4ff','#7e22ce'],
  ['#fff7ed','#c2410c'], ['#f0f9ff','#0369a1'], ['#fefce8','#a16207'],
];

function labelColor(name) {
  let h = 0;
  for (const c of name) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
  return LABEL_PALETTE[h % LABEL_PALETTE.length];
}

// ── API helper ─────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method };
  if (body !== undefined) {
    opts.headers = { 'Content-Type': 'application/json' };
    opts.body = JSON.stringify(body);
  }
  const res = await fetch('/api' + path, opts);
  if (res.status === 401) { showAuth(); return null; }
  if (res.status === 204) return null;
  return res.json();
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Stats ──────────────────────────────────────────────────────────────────
async function loadStats() {
  const s = await api('GET', '/tasks/stats');
  if (!s) return;
  document.getElementById('stats-strip').innerHTML =
    `<span><b>${s.total}</b> total</span>` +
    `<span><b>${s.incomplete}</b> incomplete</span>` +
    `<span class="${s.overdue ? 'overdue-stat' : ''}"><b>${s.overdue}</b> overdue</span>`;
}

// ── Task loading ───────────────────────────────────────────────────────────
async function loadTasks() {
  const params = new URLSearchParams();
  const search    = document.getElementById('search-input').value.trim();
  const completed = document.getElementById('filter-completed').value;
  const priority  = document.getElementById('filter-priority').value;
  if (search)    params.set('search',    search);
  if (completed) params.set('completed', completed);
  if (priority)  params.set('priority',  priority);
  if (sortState === 1) { params.set('sortBy', 'dueDate'); params.set('order', 'asc'); }
  if (sortState === 2) { params.set('sortBy', 'dueDate'); params.set('order', 'desc'); }
  params.set('limit', '100');
  const data = await api('GET', '/tasks?' + params);
  if (!data) return;
  tasks = data.data;
  renderTasks();
}

async function refresh() {
  await Promise.all([loadStats(), loadTasks()]);
  if (activeId) renderDetail();
}

// ── Task rendering ─────────────────────────────────────────────────────────
function dueCls(dueDate, completed) {
  if (!dueDate || completed) return '';
  const today = new Date(); today.setHours(0,0,0,0);
  const due   = new Date(dueDate + 'T00:00:00');
  const d     = Math.round((due - today) / 86400000);
  if (d < 0)   return 'overdue';
  if (d === 0) return 'today';
  if (d <= 3)  return 'soon';
  return '';
}

function renderTasks() {
  const el = document.getElementById('task-list');
  if (!tasks.length) { el.innerHTML = '<p class="empty-state">No tasks here. Add one above!</p>'; return; }
  el.innerHTML = tasks.map(t => {
    const dc       = dueCls(t.dueDate, t.completed);
    const subDone  = (t.subtasks || []).filter(s => s.completed).length;
    const subTotal = (t.subtasks || []).length;
    const chips = (t.labels || []).map(l => {
      const [bg, fg] = labelColor(l);
      return `<span class="label-chip" style="background:${bg};color:${fg}">${esc(l)}</span>`;
    }).join('');
    const dueLabel  = t.dueDate ? `<span class="meta-due ${dc}">📅 ${t.dueDate}${dc === 'overdue' ? ' · OVERDUE' : ''}</span>` : '';
    const subLabel  = subTotal ? `<span class="sub-progress">☑ ${subDone}/${subTotal}</span>` : '';
    const recurLabel = t.recurrence ? `<span class="recur-badge">🔁 ${t.recurrence}</span>` : '';
    const isSelected = selectedIds.has(t._id);

    const leftControl = selectMode
      ? `<div class="select-checkbox ${isSelected ? 'checked' : ''}" data-action="select" data-id="${t._id}">${isSelected ? '✓' : ''}</div>`
      : `<button class="check-btn ${t.completed ? 'checked' : ''}" data-action="toggle" data-id="${t._id}" data-done="${t.completed}">✓</button>`;

    const rightControl = selectMode
      ? ''
      : `<button class="card-delete" data-action="delete" data-id="${t._id}">🗑</button>`;

    return `
<div class="card priority-${t.priority} ${t.completed ? 'card--done' : ''} ${dc === 'overdue' && !selectMode ? 'card--overdue' : ''} ${isSelected ? 'card--selected' : ''}"
  data-id="${t._id}" draggable="${!selectMode}">
  ${leftControl}
  <div class="card-body">
    <div class="card-title">${esc(t.title)}</div>
    <div class="card-meta">
      <span class="badge badge-${t.priority}">${t.priority}</span>
      ${dueLabel}${chips}${subLabel}${recurLabel}
    </div>
  </div>
  ${rightControl}
</div>`;
  }).join('');
}

// ── Event delegation — task list ──────────────────────────────────────────
document.getElementById('task-list').addEventListener('click', async e => {
  const select = e.target.closest('[data-action="select"]');
  const toggle = e.target.closest('[data-action="toggle"]');
  const del    = e.target.closest('[data-action="delete"]');
  const card   = e.target.closest('.card');
  if (select) {
    e.stopPropagation();
    toggleCardSelection(select.dataset.id);
  } else if (toggle) {
    e.stopPropagation();
    await api('PUT', `/tasks/${toggle.dataset.id}`, { completed: toggle.dataset.done !== 'true' });
    await refresh();
  } else if (del) {
    e.stopPropagation();
    if (!confirm('Delete this task?')) return;
    if (activeId === del.dataset.id) closeDetail();
    await api('DELETE', `/tasks/${del.dataset.id}`);
    await refresh();
  } else if (card) {
    if (selectMode) {
      toggleCardSelection(card.dataset.id);
    } else {
      openDetail(card.dataset.id);
    }
  }
});

// ── Bulk select ────────────────────────────────────────────────────────────
function toggleSelectMode() {
  selectMode = !selectMode;
  selectedIds.clear();
  if (selectMode) {
    closeDetail();
  }
  const btn = document.getElementById('select-btn');
  btn.textContent = selectMode ? 'Cancel select' : 'Select';
  btn.classList.toggle('active', selectMode);
  updateActionBar();
  renderTasks();
}

function toggleCardSelection(id) {
  if (selectedIds.has(id)) {
    selectedIds.delete(id);
  } else {
    selectedIds.add(id);
  }
  // Update just this card's visual without full re-render
  const card = document.querySelector(`.card[data-id="${id}"]`);
  if (card) {
    const checked = selectedIds.has(id);
    card.classList.toggle('card--selected', checked);
    const box = card.querySelector('.select-checkbox');
    if (box) { box.classList.toggle('checked', checked); box.textContent = checked ? '✓' : ''; }
  }
  updateActionBar();
}

function updateActionBar() {
  const bar = document.getElementById('action-bar');
  const n = selectedIds.size;
  bar.classList.toggle('hidden', n === 0 && !selectMode);
  document.getElementById('action-count').textContent =
    n === 0 ? 'Nothing selected' : `${n} task${n === 1 ? '' : 's'} selected`;
}

async function bulkAction(action) {
  const ids = [...selectedIds];
  if (!ids.length) return;
  if (action === 'delete' && !confirm(`Delete ${ids.length} task${ids.length === 1 ? '' : 's'}?`)) return;
  await api('PATCH', '/tasks/bulk', { ids, action });
  selectedIds.clear();
  selectMode = false;
  document.getElementById('select-btn').textContent = 'Select';
  document.getElementById('select-btn').classList.remove('active');
  document.getElementById('action-bar').classList.add('hidden');
  await refresh();
}

document.getElementById('select-btn').addEventListener('click', toggleSelectMode);
document.getElementById('cancel-select-btn').addEventListener('click', toggleSelectMode);
document.getElementById('select-all-btn').addEventListener('click', () => {
  tasks.forEach(t => selectedIds.add(t._id));
  updateActionBar();
  renderTasks();
});
document.getElementById('bulk-complete-btn').addEventListener('click', () => bulkAction('complete'));
document.getElementById('bulk-delete-btn').addEventListener('click',   () => bulkAction('delete'));

// ── Drag-to-reorder ────────────────────────────────────────────────────────
let dragId = null;

document.getElementById('task-list').addEventListener('dragstart', e => {
  const card = e.target.closest('.card');
  if (card) { dragId = card.dataset.id; e.dataTransfer.effectAllowed = 'move'; }
});

document.getElementById('task-list').addEventListener('dragover', e => {
  e.preventDefault();
  const card = e.target.closest('.card');
  if (card && card.dataset.id !== dragId) card.classList.add('drag-over');
});

document.getElementById('task-list').addEventListener('dragleave', e => {
  const card = e.target.closest('.card');
  if (card) card.classList.remove('drag-over');
});

document.getElementById('task-list').addEventListener('drop', async e => {
  e.preventDefault();
  const target = e.target.closest('.card');
  if (!target) return;
  target.classList.remove('drag-over');
  const targetId = target.dataset.id;
  if (!dragId || dragId === targetId) return;
  const from = tasks.findIndex(t => t._id === dragId);
  const to   = tasks.findIndex(t => t._id === targetId);
  const reordered = [...tasks];
  const [moved] = reordered.splice(from, 1);
  reordered.splice(to, 0, moved);
  tasks = reordered;
  renderTasks();
  await api('POST', '/tasks/reorder', { ids: reordered.map(t => t._id) });
});

// ── Add task ───────────────────────────────────────────────────────────────
document.getElementById('add-form').addEventListener('submit', async e => {
  e.preventDefault();
  const title    = document.getElementById('new-title').value.trim();
  const dueDate  = document.getElementById('new-due').value;
  const priority = document.getElementById('new-priority').value;
  const labels   = document.getElementById('new-labels').value.split(',').map(l => l.trim()).filter(Boolean);
  const errEl    = document.getElementById('form-error');
  const res = await api('POST', '/tasks', { title, dueDate, priority, labels });
  if (res && res.error) { errEl.textContent = res.error; return; }
  errEl.textContent = '';
  e.target.reset();
  await refresh();
});

// ── Filters ────────────────────────────────────────────────────────────────
document.getElementById('search-input').addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { if (selectMode) toggleSelectMode(); loadTasks(); }, 300);
});

document.getElementById('filter-completed').addEventListener('change', () => { if (selectMode) toggleSelectMode(); loadTasks(); });
document.getElementById('filter-priority').addEventListener('change',  () => { if (selectMode) toggleSelectMode(); loadTasks(); });

document.getElementById('sort-btn').addEventListener('click', () => {
  sortState = (sortState + 1) % 3;
  const labels = ['Sort by due date', 'Due date ↑', 'Due date ↓'];
  const btn = document.getElementById('sort-btn');
  btn.textContent = labels[sortState];
  btn.classList.toggle('active', sortState > 0);
  loadTasks();
});

// ── Detail panel ───────────────────────────────────────────────────────────
function openDetail(id) {
  activeId = id;
  renderDetail();
  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('overlay').classList.add('visible');
}

function closeDetail() {
  activeId = null;
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('visible');
}

document.getElementById('overlay').addEventListener('click', closeDetail);

function renderDetail() {
  const t = tasks.find(x => x._id === activeId);
  if (!t) return;

  const panel = document.getElementById('detail-panel');
  panel.innerHTML = `
<div class="detail-header">
  <h2>Task details</h2>
  <button class="close-btn" id="dp-close">✕</button>
</div>
<div class="detail-body">
  <form id="detail-form">
    <div class="field-group">
      <label>Title</label>
      <input type="text" id="dp-title" value="${esc(t.title)}" required>
    </div>
    <div class="field-group">
      <label>Description</label>
      <textarea id="dp-desc" rows="2">${esc(t.description || '')}</textarea>
    </div>
    <div class="field-group">
      <label>Due date</label>
      <input type="date" id="dp-due" value="${t.dueDate || ''}">
    </div>
    <div class="field-group">
      <label>Priority</label>
      <select id="dp-priority">
        <option value="low"    ${t.priority==='low'    ?'selected':''}>Low</option>
        <option value="medium" ${t.priority==='medium' ?'selected':''}>Medium</option>
        <option value="high"   ${t.priority==='high'   ?'selected':''}>High</option>
      </select>
    </div>
    <div class="field-group">
      <label>Labels <small style="text-transform:none;letter-spacing:0;font-weight:400">(comma-separated)</small></label>
      <input type="text" id="dp-labels" value="${esc((t.labels||[]).join(', '))}">
    </div>
    <div class="field-group">
      <label>Recurrence</label>
      <select id="dp-recurrence">
        <option value=""        ${!t.recurrence         ?'selected':''}>None</option>
        <option value="daily"   ${t.recurrence==='daily'  ?'selected':''}>Daily</option>
        <option value="weekly"  ${t.recurrence==='weekly' ?'selected':''}>Weekly</option>
        <option value="monthly" ${t.recurrence==='monthly'?'selected':''}>Monthly</option>
      </select>
    </div>
    <button type="submit" class="detail-save">Save changes</button>
  </form>

  <div class="detail-section">
    <h3>Subtasks</h3>
    <ul class="subtask-list" id="dp-subtasks">
      ${(t.subtasks||[]).map(s => `
      <li class="subtask-item ${s.completed?'done':''}" data-sub-id="${s._id}">
        <input type="checkbox" ${s.completed?'checked':''} class="sub-check">
        <span>${esc(s.title)}</span>
        <button class="icon-del sub-del">✕</button>
      </li>`).join('')}
    </ul>
    <form class="inline-add" id="add-sub-form">
      <input type="text" placeholder="New subtask…" required>
      <button type="submit" class="btn-add">Add</button>
    </form>
  </div>

  <div class="detail-section">
    <h3>Notes</h3>
    <ul class="notes-list" id="dp-notes">
      ${(t.notes||[]).map(n => `
      <li class="note-item" data-note-id="${n._id}">
        <span>${esc(n.text)}</span>
        <button class="icon-del note-del">✕</button>
      </li>`).join('')}
    </ul>
    <form class="inline-add" id="add-note-form">
      <input type="text" placeholder="New note…" required>
      <button type="submit" class="btn-add">Add</button>
    </form>
  </div>
</div>`;

  document.getElementById('dp-close').addEventListener('click', closeDetail);

  // Save task edits
  document.getElementById('detail-form').addEventListener('submit', async e => {
    e.preventDefault();
    const labels = document.getElementById('dp-labels').value
      .split(',').map(l => l.trim()).filter(Boolean);
    const recurrence = document.getElementById('dp-recurrence').value || null;
    await api('PUT', `/tasks/${t._id}`, {
      title:       document.getElementById('dp-title').value.trim(),
      description: document.getElementById('dp-desc').value,
      dueDate:     document.getElementById('dp-due').value,
      priority:    document.getElementById('dp-priority').value,
      labels,
      recurrence,
    });
    await refresh();
  });

  // Subtask checkbox toggle
  panel.querySelectorAll('.sub-check').forEach(cb => {
    cb.addEventListener('change', async () => {
      const li = cb.closest('.subtask-item');
      await api('PATCH', `/tasks/${t._id}/subtasks/${li.dataset.subId}`, { completed: cb.checked });
      await refresh();
    });
  });

  // Delete subtask
  panel.querySelectorAll('.sub-del').forEach(btn => {
    btn.addEventListener('click', async () => {
      const li = btn.closest('.subtask-item');
      await api('DELETE', `/tasks/${t._id}/subtasks/${li.dataset.subId}`);
      await refresh();
    });
  });

  // Add subtask
  document.getElementById('add-sub-form').addEventListener('submit', async e => {
    e.preventDefault();
    const input = e.target.querySelector('input');
    await api('POST', `/tasks/${t._id}/subtasks`, { title: input.value.trim() });
    input.value = '';
    await refresh();
  });

  // Delete note
  panel.querySelectorAll('.note-del').forEach(btn => {
    btn.addEventListener('click', async () => {
      const li = btn.closest('.note-item');
      await api('DELETE', `/tasks/${t._id}/notes/${li.dataset.noteId}`);
      await refresh();
    });
  });

  // Add note
  document.getElementById('add-note-form').addEventListener('submit', async e => {
    e.preventDefault();
    const input = e.target.querySelector('input');
    await api('POST', `/tasks/${t._id}/notes`, { text: input.value.trim() });
    input.value = '';
    await refresh();
  });
}

// ── Auth ──────────────────────────────────────────────────────────────────
function showAuth() {
  document.getElementById('auth-page').style.display = 'flex';
  document.getElementById('app-page').style.display  = 'none';
}

function showApp() {
  document.getElementById('auth-page').style.display = 'none';
  document.getElementById('app-page').style.display  = 'block';
  refresh();
}

document.getElementById('tab-login').addEventListener('click', () => {
  document.getElementById('tab-login').classList.add('active');
  document.getElementById('tab-register').classList.remove('active');
  document.getElementById('login-form').classList.remove('hidden');
  document.getElementById('register-form').classList.add('hidden');
  document.getElementById('auth-error').textContent = '';
});

document.getElementById('tab-register').addEventListener('click', () => {
  document.getElementById('tab-register').classList.add('active');
  document.getElementById('tab-login').classList.remove('active');
  document.getElementById('register-form').classList.remove('hidden');
  document.getElementById('login-form').classList.add('hidden');
  document.getElementById('auth-error').textContent = '';
});

document.getElementById('login-form').addEventListener('submit', async e => {
  e.preventDefault();
  const email    = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  const res      = await fetch('/api/auth/login', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password }),
  });
  const data = await res.json();
  if (!res.ok) { document.getElementById('auth-error').textContent = data.error; return; }
  showApp();
});

document.getElementById('register-form').addEventListener('submit', async e => {
  e.preventDefault();
  const email    = document.getElementById('reg-email').value;
  const password = document.getElementById('reg-password').value;
  const res      = await fetch('/api/auth/register', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password }),
  });
  const data = await res.json();
  if (!res.ok) { document.getElementById('auth-error').textContent = data.error; return; }
  showApp();
});

document.getElementById('logout-btn').addEventListener('click', async () => {
  await fetch('/api/auth/logout', { method: 'POST' });
  tasks = [];
  closeDetail();
  showAuth();
});

// ── Keyboard shortcuts ─────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const tag = document.activeElement?.tagName;
  const typing = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';

  if (e.key === 'Escape') {
    if (activeId)   { closeDetail(); return; }
    if (selectMode) { toggleSelectMode(); return; }
    if (document.activeElement) document.activeElement.blur();
    return;
  }

  if (typing) return;

  if (e.key === 'n') {
    e.preventDefault();
    document.getElementById('new-title').focus();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
  if (e.key === '/') {
    e.preventDefault();
    document.getElementById('search-input').focus();
  }
  if (e.key === 's') {
    e.preventDefault();
    toggleSelectMode();
  }
});

// ── Boot ──────────────────────────────────────────────────────────────────
(async () => {
  const res = await fetch('/api/tasks?limit=1');
  if (res.ok) { showApp(); } else { showAuth(); }
})();
</script>
</body>
</html>
