<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VibeCoder's Tasks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      min-height: 100vh;
    }

    /* ── Layout ── */
    .page {
      max-width: 680px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem;
    }

    /* ── Auth panel ── */
    #auth-panel {
      max-width: 400px;
      margin: 5rem auto;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }

    #auth-panel .auth-logo {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    #auth-panel h2 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #0f172a;
      margin-bottom: 1.75rem;
    }

    .auth-tabs {
      display: flex;
      gap: 1.5rem;
      border-bottom: 1px solid #e2e8f0;
      margin-bottom: 1.5rem;
    }

    .auth-tab {
      flex: none;
      padding: 0.4rem 0;
      border: none;
      border-bottom: 2px solid transparent;
      background: none;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      color: #64748b;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }

    .auth-tab.active {
      color: #0d9488;
      border-bottom-color: #0d9488;
    }

    #auth-panel input {
      display: block;
      width: 100%;
      padding: 0.625rem 0.875rem;
      margin-bottom: 0.75rem;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      color: #0f172a;
      background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    #auth-panel input:focus {
      outline: none;
      border-color: #0d9488;
      box-shadow: 0 0 0 3px rgba(13,148,136,0.12);
    }

    #auth-panel button[type="submit"] {
      width: 100%;
      padding: 0.675rem;
      background: #0d9488;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 500;
      font-family: inherit;
      transition: background 0.15s;
    }

    #auth-panel button[type="submit"]:hover { background: #0f766e; }

    #auth-error {
      color: #ef4444;
      font-size: 0.83rem;
      margin-top: 0.75rem;
      min-height: 1.1rem;
    }

    /* ── App header ── */
    #app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 1.25rem;
      margin-bottom: 1.75rem;
      border-bottom: 1px solid #e2e8f0;
    }

    #app-header h1 {
      font-size: 1.15rem;
      font-weight: 600;
      color: #0f172a;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    #app-header h1::before { content: '✓'; color: #0d9488; }

    #logout-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
      color: #94a3b8;
      padding: 0.25rem 0;
      transition: color 0.15s;
    }

    #logout-btn:hover { color: #ef4444; }

    /* ── Add task form ── */
    #task-form {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }

    .form-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .form-row-secondary {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.625rem;
      padding-top: 0.625rem;
      border-top: 1px solid #f1f5f9;
      flex-wrap: wrap;
    }

    #task-form input, #task-form select {
      border: none;
      background: none;
      font-size: 0.9rem;
      font-family: inherit;
      color: #0f172a;
      padding: 0.25rem 0;
      outline: none;
    }

    #task-form input::placeholder { color: #94a3b8; }

    #title { flex: 1; font-size: 0.95rem; min-width: 0; }

    #description {
      flex: 1;
      min-width: 120px;
      font-size: 0.85rem;
      color: #64748b;
    }

    #description::placeholder { color: #cbd5e1; }

    #dueDate {
      font-size: 0.82rem;
      color: #64748b;
      cursor: pointer;
    }

    #task-form select {
      font-size: 0.82rem;
      color: #64748b;
      cursor: pointer;
    }

    #task-form button[type="submit"] {
      background: #0d9488;
      color: #fff;
      border: none;
      border-radius: 8px;
      width: 2rem;
      height: 2rem;
      font-size: 1.2rem;
      line-height: 1;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    #task-form button[type="submit"]:hover { background: #0f766e; }

    #error { color: #ef4444; font-size: 0.83rem; margin-bottom: 0.75rem; min-height: 1rem; }

    /* ── Filters ── */
    .filters {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .filter-group span {
      font-size: 0.75rem;
      font-weight: 500;
      color: #cbd5e1;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .filter-btn {
      background: none;
      border: none;
      padding: 0.1rem 0;
      font-size: 0.82rem;
      font-family: inherit;
      font-weight: 500;
      color: #94a3b8;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }

    .filter-btn:hover { color: #64748b; }
    .filter-btn.active { color: #0d9488; border-bottom-color: #0d9488; }

    /* ── Task cards ── */
    #tasks { display: grid; gap: 0.5rem; }

    .task-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 0.875rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.875rem;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
      transition: box-shadow 0.15s;
      cursor: grab;
    }

    .task-card:hover {
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .task-card:hover .delete-btn { opacity: 1; }

    .task-card.completed { opacity: 0.45; }
    .task-card.completed h3 { text-decoration: line-through; color: #94a3b8; }

    .task-card.overdue   { background: #fef7f7; }
    .task-card.due-today { background: #fff8f3; }
    .task-card.due-soon  { background: #fefdf0; }

    /* Custom checkbox */
    .task-card input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 1.1rem;
      height: 1.1rem;
      border: 2px solid #cbd5e1;
      border-radius: 50%;
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
      transition: background 0.15s, border-color 0.15s;
    }

    .task-card input[type="checkbox"]:checked {
      background: #0d9488;
      border-color: #0d9488;
    }

    .task-card input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      top: 2px; left: 5px;
      width: 3px; height: 6px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    .task-info { flex: 1; min-width: 0; }

    .task-info h3 {
      font-size: 0.925rem;
      font-weight: 500;
      color: #0f172a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .task-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.2rem;
      flex-wrap: wrap;
    }

    .description {
      font-size: 0.78rem;
      color: #94a3b8;
    }

    .due-date {
      font-size: 0.78rem;
      color: #94a3b8;
    }

    .due-date.overdue   { color: #ef4444; font-weight: 500; }
    .due-date.due-today { color: #f97316; font-weight: 500; }
    .due-date.due-soon  { color: #ca8a04; font-weight: 500; }

    /* Priority select on card */
    select.priority {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border: none;
      border-radius: 4px;
      padding: 0.15rem 0.4rem;
      cursor: pointer;
      font-family: inherit;
      appearance: none;
      -webkit-appearance: none;
    }

    select.priority.low    { background: #f0fdf4; color: #16a34a; }
    select.priority.medium { background: #fffbeb; color: #d97706; }
    select.priority.high   { background: #fef2f2; color: #dc2626; }

    .delete-btn {
      background: none;
      border: none;
      color: #cbd5e1;
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0.25rem;
      flex-shrink: 0;
      opacity: 0;
      transition: color 0.15s, opacity 0.15s;
      line-height: 1;
    }

    .delete-btn:hover { color: #ef4444; }

    /* ── Drag ── */
    .task-card.drag-over { border-top: 2px solid #0d9488; }

    /* ── Inline edit ── */
    .editable-title { cursor: pointer; }
    .editable-title:hover { color: #0d9488; }

    .edit-input {
      font-size: 0.925rem;
      font-weight: 500;
      font-family: inherit;
      border: none;
      border-bottom: 2px solid #0d9488;
      outline: none;
      background: transparent;
      width: 100%;
      padding: 0;
      color: #0f172a;
    }

    /* ── Label chips ── */
    .label-chip {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 600;
      padding: 0.1rem 0.45rem;
      border-radius: 4px;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }

    .label-chip:hover { opacity: 0.75; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
      }
    }

    /* ── Empty state ── */
    #empty {
      text-align: center;
      color: #cbd5e1;
      font-size: 0.875rem;
      padding: 3rem 0;
    }
  </style>
</head>
<body>

  <div id="auth-panel">
    <div class="auth-logo">✓</div>
    <h2>VibeCoder's Tasks</h2>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Login</button>
      <button class="auth-tab" onclick="switchTab('register')">Register</button>
    </div>
    <form id="auth-form" onsubmit="handleAuth(event)">
      <input type="email" id="auth-email" placeholder="Email" required>
      <input type="password" id="auth-password" placeholder="Password (min 6 chars)" required>
      <button type="submit" id="auth-submit">Login</button>
    </form>
    <p id="auth-error"></p>
  </div>

  <div id="app" hidden>
    <div class="page">
      <div id="app-header">
        <h1>VibeCoder's Tasks</h1>
        <button id="logout-btn" onclick="logout()">Logout</button>
      </div>

      <form id="task-form">
        <div class="form-row">
          <input type="text" id="title" placeholder="Add a task…" required>
          <button type="submit" title="Add task">+</button>
        </div>
        <div class="form-row-secondary">
          <input type="text" id="description" placeholder="Description">
          <input type="text" id="labels" placeholder="Labels (e.g. work, design)">
          <input type="date" id="dueDate">
          <select id="priority">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
          </select>
        </div>
      </form>

      <p id="error"></p>

      <div class="filters">
        <div class="filter-group">
          <span>Status</span>
          <button class="filter-btn active" onclick="setFilter('status', 'all', this)">All</button>
          <button class="filter-btn" onclick="setFilter('status', 'active', this)">Active</button>
          <button class="filter-btn" onclick="setFilter('status', 'completed', this)">Completed</button>
        </div>
        <div class="filter-group">
          <span>Priority</span>
          <button class="filter-btn active" onclick="setFilter('priority', 'all', this)">All</button>
          <button class="filter-btn" onclick="setFilter('priority', 'high', this)">High</button>
          <button class="filter-btn" onclick="setFilter('priority', 'medium', this)">Medium</button>
          <button class="filter-btn" onclick="setFilter('priority', 'low', this)">Low</button>
        </div>
        <div id="label-filter-group" class="filter-group" hidden></div>
      </div>

      <p id="empty" hidden>You're all caught up!</p>
      <div id="tasks"></div>
    </div>
  </div><!-- #app -->

  <script>
    const API = '/api/tasks';
    let allTasks = [];
    const filters = { status: 'all', priority: 'all', label: 'all' };
    let activeTab = 'login';

    const LABEL_COLORS = [
      { bg: '#f0fdf4', text: '#15803d' },
      { bg: '#eff6ff', text: '#1d4ed8' },
      { bg: '#fdf4ff', text: '#7e22ce' },
      { bg: '#fff7ed', text: '#c2410c' },
      { bg: '#f0f9ff', text: '#0369a1' },
      { bg: '#fefce8', text: '#a16207' },
      { bg: '#f5f3ff', text: '#6d28d9' },
    ];

    function labelColor(name) {
      let h = 0;
      for (const c of name) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
      return LABEL_COLORS[h % LABEL_COLORS.length];
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function jsonHeaders() {
      return { 'Content-Type': 'application/json' };
    }

    function switchTab(tab) {
      activeTab = tab;
      document.querySelectorAll('.auth-tab').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === tab));
      document.getElementById('auth-submit').textContent = tab === 'login' ? 'Login' : 'Register';
      document.getElementById('auth-error').textContent = '';
    }

    async function handleAuth(e) {
      e.preventDefault();
      const email = document.getElementById('auth-email').value.trim();
      const password = document.getElementById('auth-password').value;
      const res = await fetch(`/api/auth/${activeTab}`, {
        method: 'POST',
        headers: jsonHeaders(),
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) { document.getElementById('auth-error').textContent = data.error; return; }
      showApp();
    }

    async function logout() {
      await fetch('/api/auth/logout', { method: 'POST' });
      document.getElementById('app').hidden = true;
      document.getElementById('auth-panel').hidden = false;
      document.getElementById('auth-error').textContent = '';
      allTasks = [];
    }

    function showApp() {
      document.getElementById('auth-panel').hidden = true;
      document.getElementById('app').hidden = false;
      loadTasks();
    }

    function dueDateClass(dueDate) {
      if (!dueDate) return '';
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const due = new Date(dueDate + 'T00:00:00');
      const diffDays = Math.round((due - today) / (1000 * 60 * 60 * 24));
      if (diffDays < 0)  return 'overdue';
      if (diffDays === 0) return 'due-today';
      if (diffDays <= 3)  return 'due-soon';
      return '';
    }

    function setFilter(type, value, btn) {
      filters[type] = value;
      btn.closest('.filter-group').querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderTasks();
    }

    function filterByLabel(label) {
      if (label === '__all__') {
        filters.label = 'all';
      } else {
        filters.label = filters.label === label ? 'all' : label;
      }
      renderTasks();
      renderLabelFilter();
    }

    function renderLabelFilter() {
      const allLabels = [...new Set(allTasks.flatMap(t => t.labels || []))].sort();
      const group = document.getElementById('label-filter-group');
      if (allLabels.length === 0) { group.hidden = true; return; }
      group.hidden = false;
      const allBtn = `<button class="filter-btn ${filters.label === 'all' ? 'active' : ''}" onclick="filterByLabel('__all__')">All</button>`;
      const labelBtns = allLabels.map(l => {
        const { bg, text } = labelColor(l);
        const isActive = filters.label === l;
        return `<button class="filter-btn ${isActive ? 'active' : ''}" style="${isActive ? `color:${text}` : ''}" data-label="${escapeHtml(l)}" onclick="filterByLabel(this.dataset.label)">${escapeHtml(l)}</button>`;
      }).join('');
      group.innerHTML = `<span>Label</span>${allBtn}${labelBtns}`;
    }

    function renderTasks() {
      const tasks = allTasks.filter(t => {
        if (filters.status === 'active'    && t.completed)  return false;
        if (filters.status === 'completed' && !t.completed) return false;
        if (filters.priority !== 'all' && t.priority !== filters.priority) return false;
        if (filters.label !== 'all' && !(t.labels || []).includes(filters.label)) return false;
        return true;
      });
      const container = document.getElementById('tasks');
      document.getElementById('empty').hidden = tasks.length > 0;
      container.innerHTML = tasks.map(task => {
        const dc = task.completed ? '' : dueDateClass(task.dueDate);
        const chips = (task.labels || []).map(l => {
          const { bg, text } = labelColor(l);
          return `<span class="label-chip" style="background:${bg};color:${text}" data-label="${escapeHtml(l)}" onclick="filterByLabel(this.dataset.label)" title="Filter by ${escapeHtml(l)}">${escapeHtml(l)}</span>`;
        }).join('');
        const metaText = [
          task.description ? `<span class="description">${escapeHtml(task.description)}</span>` : '',
          task.dueDate     ? `<span class="due-date ${dc}">Due ${escapeHtml(task.dueDate)}</span>` : '',
        ].filter(Boolean).join('<span style="color:#e2e8f0">·</span>');
        const meta = chips + (chips && metaText ? '<span style="color:#e2e8f0;margin:0 0.15rem">·</span>' : '') + metaText;
        return `
        <div class="task-card ${task.completed ? 'completed' : ''} ${dc}"
          draggable="true"
          data-id="${task._id}"
          ondragstart="onDragStart(event)"
          ondragover="onDragOver(event)"
          ondragleave="onDragLeave(event)"
          ondrop="onDrop(event)">
          <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask('${task._id}', this.checked)">
          <div class="task-info">
            <h3 class="editable-title" onclick="startEdit('${task._id}', this)" title="Click to edit">${escapeHtml(task.title)}</h3>
            ${meta ? `<div class="task-meta">${meta}</div>` : ''}
          </div>
          <select class="priority ${task.priority}" onchange="updatePriority('${task._id}', this)">
            <option value="low"    ${task.priority === 'low'    ? 'selected' : ''}>Low</option>
            <option value="medium" ${task.priority === 'medium' ? 'selected' : ''}>Medium</option>
            <option value="high"   ${task.priority === 'high'   ? 'selected' : ''}>High</option>
          </select>
          <button class="delete-btn" onclick="deleteTask('${task._id}')">✕</button>
        </div>`;
      }).join('');
    }

    let draggedId = null;

    function onDragStart(e) {
      draggedId = e.currentTarget.dataset.id;
      e.dataTransfer.effectAllowed = 'move';
    }

    function onDragOver(e) {
      e.preventDefault();
      e.currentTarget.classList.add('drag-over');
    }

    function onDragLeave(e) {
      e.currentTarget.classList.remove('drag-over');
    }

    async function onDrop(e) {
      e.preventDefault();
      e.currentTarget.classList.remove('drag-over');
      const targetId = e.currentTarget.dataset.id;
      if (!draggedId || draggedId === targetId) return;

      const fromIndex = allTasks.findIndex(t => t._id === draggedId);
      const toIndex   = allTasks.findIndex(t => t._id === targetId);
      const reordered = [...allTasks];
      const [moved] = reordered.splice(fromIndex, 1);
      reordered.splice(toIndex, 0, moved);

      allTasks = reordered;
      renderTasks();

      await fetch(`${API}/reorder`, {
        method: 'POST',
        headers: jsonHeaders(),
        body: JSON.stringify({ ids: reordered.map(t => t._id) }),
      });
    }

    function startEdit(id, el) {
      const original = el.textContent;
      const input = document.createElement('input');
      input.className = 'edit-input';
      input.value = original;
      el.replaceWith(input);
      input.focus();

      async function saveEdit() {
        const newTitle = input.value.trim();
        if (newTitle && newTitle !== original) {
          await fetch(`${API}/${id}`, {
            method: 'PUT',
            headers: jsonHeaders(),
            body: JSON.stringify({ title: newTitle }),
          });
          await loadTasks();
        } else {
          input.replaceWith(el);
        }
      }

      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') saveEdit();
        if (e.key === 'Escape') input.replaceWith(el);
      });
      input.addEventListener('blur', saveEdit);
    }

    async function loadTasks() {
      const res = await fetch(API);
      if (res.status === 401) { logout(); return; }
      allTasks = await res.json();
      renderTasks();
      renderLabelFilter();
    }

    async function toggleTask(id, completed) {
      await fetch(`${API}/${id}`, {
        method: 'PUT',
        headers: jsonHeaders(),
        body: JSON.stringify({ completed }),
      });
      loadTasks();
    }

    async function deleteTask(id) {
      await fetch(`${API}/${id}`, { method: 'DELETE' });
      loadTasks();
    }

    async function updatePriority(id, select) {
      const priority = select.value;
      select.className = `priority ${priority}`;
      await fetch(`${API}/${id}`, {
        method: 'PUT',
        headers: jsonHeaders(),
        body: JSON.stringify({ priority }),
      });
    }

    document.getElementById('task-form').addEventListener('submit', async e => {
      e.preventDefault();
      const title = document.getElementById('title').value.trim();
      const description = document.getElementById('description').value.trim();
      const dueDate = document.getElementById('dueDate').value;
      const priority = document.getElementById('priority').value;
      const labels = document.getElementById('labels').value.split(',').map(l => l.trim()).filter(Boolean);
      const errorEl = document.getElementById('error');

      const res = await fetch(API, {
        method: 'POST',
        headers: jsonHeaders(),
        body: JSON.stringify({ title, description, dueDate, priority, labels }),
      });

      if (!res.ok) {
        const { error } = await res.json();
        errorEl.textContent = error;
        return;
      }

      errorEl.textContent = '';
      e.target.reset();
      loadTasks();
    });

    fetch(API).then(res => {
      if (res.ok) return res.json().then(tasks => {
        allTasks = tasks;
        document.getElementById('auth-panel').hidden = true;
        document.getElementById('app').hidden = false;
        renderTasks();
        renderLabelFilter();
      });
    });
  </script>
</body>
</html>
